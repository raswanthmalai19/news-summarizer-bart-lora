<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>News Summarizer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 1300px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: white;
            margin-bottom: 25px;
            font-size: 4rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .subtitle {
            text-align: center;
            color: rgba(255,255,255,0.9);
            margin-bottom: 50px;
            font-size: 1.5rem;
        }

        .card {
            background: white;
            border-radius: 20px;
            padding: 60px;
            box-shadow: 0 15px 50px rgba(0,0,0,0.2);
        }

        label {
            display: block;
            font-weight: 600;
            color: #333;
            margin-bottom: 15px;
            font-size: 1.6rem;
        }

        textarea {
            width: 100%;
            height: 300px;
            padding: 25px;
            border: 3px solid #e0e0e0;
            border-radius: 15px;
            font-size: 1.5rem;
            font-family: inherit;
            resize: vertical;
            transition: border-color 0.3s;
        }

        textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 25px 45px;
            margin-top: 35px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 1.7rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .result-section {
            margin-top: 30px;
            display: none;
        }

        .result-section.show {
            display: block;
        }

        .result-label {
            font-weight: 600;
            color: #333;
            margin-bottom: 20px;
            font-size: 1.8rem;
        }

        .summary-box {
            background: #f8f9fa;
            border-left: 6px solid #667eea;
            padding: 35px;
            border-radius: 0 15px 15px 0;
            line-height: 1.8;
            color: #333;
            font-size: 1.5rem;
        }

        .stats {
            margin-top: 25px;
            padding: 20px 25px;
            background: #e8f4f8;
            border-radius: 12px;
            font-size: 1.4rem;
            color: #666;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #667eea;
        }

        .spinner {
            display: inline-block;
            width: 30px;
            height: 30px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error {
            background: #ffe6e6;
            border-left: 4px solid #e74c3c;
            padding: 15px;
            border-radius: 0 10px 10px 0;
            color: #c0392b;
        }

        .nlp-badge {
            display: inline-block;
            background: rgba(255,255,255,0.2);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.8rem;
            margin-bottom: 20px;
        }

        .tabs {
            display: flex;
            margin-bottom: 20px;
            border-bottom: 2px solid #e0e0e0;
        }

        .tab {
            padding: 18px 35px;
            background: none;
            border: none;
            font-size: 1.5rem;
            font-weight: 600;
            color: #888;
            cursor: pointer;
            transition: all 0.3s;
            border-bottom: 4px solid transparent;
            margin-bottom: -3px;
        }

        .tab:hover {
            color: #667eea;
        }

        .tab.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .url-input {
            width: 100%;
            padding: 25px;
            border: 3px solid #e0e0e0;
            border-radius: 15px;
            font-size: 1.5rem;
            font-family: inherit;
            transition: border-color 0.3s;
        }

        .url-input:focus {
            outline: none;
            border-color: #667eea;
        }

        .extracted-text {
            background: #f0f0f0;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            font-size: 0.9rem;
            color: #555;
            max-height: 150px;
            overflow-y: auto;
        }

        .extracted-label {
            font-weight: 600;
            color: #666;
            margin-bottom: 5px;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📰 News Summarizer</h1>
        
        <div class="card">
            <div class="tabs">
                <button class="tab active" id="textTabBtn">📝 Paste Text</button>
                <button class="tab" id="urlTabBtn">🔗 Enter URL</button>
            </div>

            <div id="textTab" class="tab-content active">
                <label for="newsInput">Paste your news article here:</label>
                <textarea 
                    id="newsInput" 
                    placeholder="Paste the news article text here..."
                ></textarea>
                
                <!-- Summarization Type Selection -->
                <div style="margin: 20px 0;">
                    <label style="margin-bottom: 10px; display: block;">Choose summarization method:</label>
                    <div style="display: flex; gap: 20px; margin-bottom: 10px;">
                        <label style="display: flex; align-items: center; gap: 8px; font-weight: normal;">
                            <input type="radio" name="textSummaryType" value="extractive" checked>
                            <span>🔍 Extractive</span>
                            <small style="color: #666; margin-left: 5px;">(Select existing sentences)</small>
                        </label>
                        <label style="display: flex; align-items: center; gap: 8px; font-weight: normal;">
                            <input type="radio" name="textSummaryType" value="abstractive">
                            <span>🤖 Abstractive</span>
                            <small style="color: #666; margin-left: 5px;">(Generate new summary)</small>
                        </label>
                    </div>
                    
                    <!-- Summary Length Selection -->
                    <div style="margin-top: 15px;">
                        <label style="margin-bottom: 5px; display: block; font-size: 0.9rem;">Summary length:</label>
                        <select id="textSummaryLength" style="padding: 8px; border: 1px solid #ddd; border-radius: 5px; background: white;">
                            <option value="short">📝 Short (2-3 sentences)</option>
                            <option value="medium" selected>📄 Medium (4-6 sentences)</option>
                            <option value="long">📰 Long (7-10 sentences)</option>
                        </select>
                    </div>
                </div>
                
                <button class="btn" id="summarizeBtn">
                    Generate Summary
                </button>
            </div>

            <div id="urlTab" class="tab-content">
                <label for="urlInput">Enter the news article URL:</label>
                <input 
                    type="url" 
                    id="urlInput" 
                    class="url-input"
                    placeholder="https://example.com/news-article"
                >
                
                <!-- Summarization Type Selection -->
                <div style="margin: 20px 0;">
                    <label style="margin-bottom: 10px; display: block;">Choose summarization method:</label>
                    <div style="display: flex; gap: 20px; margin-bottom: 10px;">
                        <label style="display: flex; align-items: center; gap: 8px; font-weight: normal;">
                            <input type="radio" name="urlSummaryType" value="extractive" checked>
                            <span>🔍 Extractive</span>
                            <small style="color: #666; margin-left: 5px;">(Select existing sentences)</small>
                        </label>
                        <label style="display: flex; align-items: center; gap: 8px; font-weight: normal;">
                            <input type="radio" name="urlSummaryType" value="abstractive">
                            <span>🤖 Abstractive</span>
                            <small style="color: #666; margin-left: 5px;">(Generate new summary)</small>
                        </label>
                    </div>
                    
                    <!-- Summary Length Selection -->
                    <div style="margin-top: 15px;">
                        <label style="margin-bottom: 5px; display: block; font-size: 0.9rem;">Summary length:</label>
                        <select id="urlSummaryLength" style="padding: 8px; border: 1px solid #ddd; border-radius: 5px; background: white;">
                            <option value="short">📝 Short (2-3 sentences)</option>
                            <option value="medium" selected>📄 Medium (4-6 sentences)</option>
                            <option value="long">📰 Long (7-10 sentences)</option>
                        </select>
                    </div>
                </div>
                
                <button class="btn" id="summarizeUrlBtn">
                    Extract & Summarize
                </button>
            </div>
            
            <div class="result-section" id="resultSection">
                <div class="loading" id="loading" style="display: none;">
                    <div class="spinner"></div>
                    <p>Analyzing text using NLP algorithms...</p>
                </div>
                
                <div id="summaryResult"></div>
            </div>
        </div>
    </div>

    <script>
        // Tab switching
        document.getElementById('textTabBtn').addEventListener('click', function() {
            switchTab('text', this);
        });
        
        document.getElementById('urlTabBtn').addEventListener('click', function() {
            switchTab('url', this);
        });

        function switchTab(tab, btn) {
            // Update tab buttons
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            btn.classList.add('active');
            
            // Update tab content
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.getElementById(tab + 'Tab').classList.add('active');
            
            // Hide results when switching tabs
            document.getElementById('resultSection').classList.remove('show');
        }

        // Summarize text button
        document.getElementById('summarizeBtn').addEventListener('click', summarizeText);

        async function summarizeText() {
            const text = document.getElementById('newsInput').value.trim();
            const summaryType = document.querySelector('input[name="textSummaryType"]:checked').value;
            const summaryLength = document.getElementById('textSummaryLength').value;
            const btn = document.getElementById('summarizeBtn');
            
            if (!text) {
                alert('Please paste some news text to summarize.');
                return;
            }
            
            await performSummarization('/summarize', { text: text, type: summaryType, length: summaryLength }, btn, 'Generate Summary');
        }

        // Summarize URL button
        document.getElementById('summarizeUrlBtn').addEventListener('click', summarizeUrl);

        async function summarizeUrl() {
            const url = document.getElementById('urlInput').value.trim();
            const summaryType = document.querySelector('input[name="urlSummaryType"]:checked').value;
            const summaryLength = document.getElementById('urlSummaryLength').value;
            const btn = document.getElementById('summarizeUrlBtn');
            
            if (!url) {
                alert('Please enter a URL to summarize.');
                return;
            }
            
            await performSummarization('/summarize_url', { url: url, type: summaryType, length: summaryLength }, btn, 'Extract & Summarize', true);
        }

        async function performSummarization(endpoint, body, btn, originalText, showExtracted = false) {
            const resultSection = document.getElementById('resultSection');
            const loading = document.getElementById('loading');
            const summaryResult = document.getElementById('summaryResult');
            
            // Show loading state
            btn.disabled = true;
            btn.textContent = 'Processing...';
            resultSection.classList.add('show');
            loading.style.display = 'block';
            summaryResult.innerHTML = '';
            
            try {
                const response = await fetch(endpoint, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(body)
                });
                
                const data = await response.json();
                
                loading.style.display = 'none';
                
                if (response.ok) {
                    const summaryTypeIcon = data.type === 'abstractive' ? '🤖' : '🔍';
                    const summaryTypeText = data.type === 'abstractive' ? 'Abstractive Summary' : 'Extractive Summary';
                    
                    let html = `
                        <p class="result-label">${summaryTypeIcon} ${summaryTypeText}:</p>
                        <div class="summary-box">${data.summary}</div>
                        <div class="stats">
                            <strong>Statistics:</strong> 
                            ${data.type === 'abstractive' ? 
                                `Generated ${data.summary_sentences} sentence(s) from ${data.original_sentences} original sentences using BART model` :
                                `Reduced from ${data.original_sentences} sentences to ${data.summary_sentences} key sentences using TF-IDF algorithm`
                            }
                        </div>
                    `;
                    
                    if (showExtracted && data.extracted_text) {
                        html += `
                            <p class="extracted-label" style="margin-top: 20px;">📄 Extracted Content Preview:</p>
                            <div class="extracted-text">${data.extracted_text}</div>
                        `;
                    }
                    
                    summaryResult.innerHTML = html;
                } else {
                    summaryResult.innerHTML = `
                        <div class="error">${data.error || 'An error occurred'}</div>
                    `;
                }
            } catch (error) {
                loading.style.display = 'none';
                summaryResult.innerHTML = `
                    <div class="error">Failed to connect to the server. Please try again.</div>
                `;
            }
            
            btn.disabled = false;
            btn.textContent = originalText;
        }
        
        // Allow Ctrl+Enter to submit for text input
        document.getElementById('newsInput').addEventListener('keydown', function(e) {
            if (e.ctrlKey && e.key === 'Enter') {
                summarizeText();
            }
        });

        // Allow Enter to submit for URL input
        document.getElementById('urlInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                summarizeUrl();
            }
        });
    </script>
</body>
</html>
